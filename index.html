    <!-- Script to handle PerformanceServerTiming error -->
    <script>
      (function() {
        // Handle PerformanceServerTiming DataCloneError
        window.addEventListener('error', function(e) {
          if (e.error instanceof DOMException && 
              (e.error.name === 'DataCloneError' || e.message?.includes('PerformanceServerTiming'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return false;
          }
        });
        
        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason?.message?.includes('PerformanceServerTiming')) {
            e.preventDefault();
            return false;
          }
        });
        
        // Console error filter
        const originalConsoleError = console.error;
        console.error = function(...args) {
          if (args[0]?.includes?.('PerformanceServerTiming')) {
            return;
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>

      * {

      /* Loading indicator */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #faf7f2 0%, #f0ede5 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #e5e7eb;
        border-top-color: #15803d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Skip to content link for accessibility */

        top: -40px;
        left: 0;
        background: #15803d;
        color: white;
        padding: 8px 16px;
        text-decoration: none;
        z-index: 100;
        transition: top 0.2s;
      }

      }

    <!-- Remove loading screen after React mounts -->
    <script>
      window.addEventListener('load', function() {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              if (loadingScreen.parentNode) {
                loadingScreen.parentNode.removeChild(loadingScreen);
              }
            }, 500);
          }, 500);
        }
      });
    </script>
